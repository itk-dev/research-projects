site_name: ITKdev Research
site_description: Research projects from ITKdev
site_url: ""

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: grey
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.top
    - search.suggest
    - content.tabs.link
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Climate Awareness Nudging:
      - Overview: projects/climate-nudging/index.md
      - Nudge Ideas: projects/climate-nudging/ideas.md
      - CO2 Research: projects/climate-nudging/co2-research.md
      - Integration Points: projects/climate-nudging/integration.md
      - Interactive Mocks: projects/climate-nudging/mocks.md
  - Lønforhandlingssystem:
      - Overview: projects/salary-negotiation/index.md
      - Interactive Mocks: projects/salary-negotiation/mocks.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/itk-dev
