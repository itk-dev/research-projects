site_name: AI Research — Aarhus Kommune
site_description: Research projects on responsible AI usage
site_url: ""

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - content.tabs.link
  icon:
    logo: material/leaf
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Projects:
      - Climate Awareness Nudging:
          - Overview: projects/climate-nudging/index.md
          - Nudge Ideas: projects/climate-nudging/ideas.md
          - CO2 Research: projects/climate-nudging/co2-research.md
          - Integration Points: projects/climate-nudging/integration.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/itk-dev
