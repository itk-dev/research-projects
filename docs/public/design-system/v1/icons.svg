<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    ITK Dev Design System — line icon sprite (v1)
    Usage:
      <svg class="ds-icon" aria-hidden="true">
        <use href="/research-projects/design-system/v1/icons.svg#home"/>
      </svg>
    All icons: 24x24 viewBox, no fill, 1.75 stroke, round caps/joins,
    inherit color via currentColor.
  -->
  <defs>
    <style>
      symbol { stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <symbol id="home" viewBox="0 0 24 24">
    <path d="M3 11 L12 4 L21 11 V20 A1 1 0 0 1 20 21 H15 V14 H9 V21 H4 A1 1 0 0 1 3 20 Z"/>
